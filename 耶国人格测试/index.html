<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>耶国人格测试</title>
  <style>
    :root{
      --bg:#fff7fb;
      --card:#fff;
      --text:#2e2433;
      --muted:#806f88;
      --pink:#ff73b7;
      --purple:#9b79e6;
      --border:#ffd2e8;
      --shadow:0 22px 56px rgba(255,115,183,.2);
      --radius:30px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 8% 8%,rgba(255,178,215,.65),transparent 32%),
        radial-gradient(circle at 88% 14%,rgba(216,196,255,.6),transparent 30%),
        var(--bg);
    }

    button{
      appearance:none;
      border:0;
      cursor:pointer;
      font:inherit;
    }

    .app{
      width:min(980px,92vw);
      margin:0 auto;
      padding:38px 0 58px;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius);
      background:rgba(255,255,255,.92);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .panel:before{
      content:"";
      position:absolute;
      inset:16px;
      border:2px dashed rgba(255,173,214,.45);
      border-radius:22px;
      pointer-events:none;
      z-index:1;
    }

    .hero,.quiz,.result{padding:42px 34px}

    .hero{text-align:center}

    .badge{
      position:relative;
      z-index:3;
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:9px 16px;
      border-radius:999px;
      background:#ffe6f4;
      color:#dd4d94;
      font-weight:900;
      font-size:14px;
      margin-bottom:18px;
    }

    h1{
      position:relative;
      z-index:3;
      margin:0;
      font-size:clamp(38px,7vw,72px);
      letter-spacing:-2px;
      line-height:1.02;
      color:#f65fa9;
      text-shadow:3px 3px 0 #fff,6px 6px 0 rgba(154,121,230,.2);
    }

    .primary-btn,.secondary-btn,.ghost-btn{
      position:relative;
      z-index:3;
      border-radius:999px;
      font-weight:950;
      transition:.16s;
    }

    .primary-btn{
      min-height:52px;
      padding:0 28px;
      color:white;
      background:linear-gradient(135deg,var(--pink),#ff8fc7);
      box-shadow:0 12px 24px rgba(255,115,183,.34);
    }

    .secondary-btn{
      min-height:48px;
      padding:0 22px;
      color:#db4f96;
      background:#ffe6f4;
    }

    .ghost-btn{
      color:var(--muted);
      background:transparent;
      padding:12px 4px;
    }

    .primary-btn:hover,.secondary-btn:hover{transform:translateY(-2px)}
    .ghost-btn:disabled{opacity:.35;cursor:not-allowed}

    /* 封面 */
    .cover-hero{
      padding:0;
      overflow:hidden;
      min-height:min(78vh,760px);
    }

    .cover-media{
      position:absolute;
      inset:0;
      z-index:0;
      background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,.92), transparent 18%),
        linear-gradient(145deg,#ffe2f2,#f6edff 52%,#fff5df);
    }

    .cover-image{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .cover-image:not([src]),
    .cover-image[src=""]{
      display:none;
    }

    .cover-placeholder{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      padding:40px;
      color:#e35e9d;
      font-weight:1000;
      font-size:clamp(26px,5vw,54px);
      text-align:center;
      letter-spacing:-1px;
    }

    .cover-placeholder span{
      display:block;
      max-width:660px;
      text-shadow:3px 3px 0 #fff;
    }

    .cover-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to top, rgba(23,12,24,.72) 0%, rgba(23,12,24,.42) 34%, rgba(23,12,24,.15) 62%, rgba(23,12,24,.02) 100%),
        radial-gradient(circle at 85% 18%, rgba(255,255,255,.18), transparent 28%);
      z-index:1;
    }

    .cover-content{
      position:relative;
      z-index:3;
      min-height:min(78vh,760px);
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:flex-start;
      padding:48px 34px 38px;
      text-align:left;
    }

    .cover-hero h1{
      color:#fff;
      text-shadow:0 6px 24px rgba(0,0,0,.38),3px 3px 0 rgba(255,115,183,.22);
      margin-bottom:18px;
    }

    .cover-note{
      margin:0 0 24px;
      color:#fff;
      font-size:clamp(18px,2.3vw,24px);
      font-weight:900;
      line-height:1.55;
      text-shadow:0 3px 12px rgba(0,0,0,.3);
      max-width:760px;
    }

    .quiz,.result{display:none}

    .topbar{
      position:relative;
      z-index:3;
      display:flex;
      justify-content:space-between;
      gap:18px;
      color:var(--muted);
      font-size:14px;
      font-weight:900;
      margin-bottom:20px;
    }

    .progress-wrap{
      position:relative;
      z-index:3;
      height:11px;
      border-radius:999px;
      background:#ffe8f3;
      overflow:hidden;
      margin-bottom:30px;
    }

    .progress{
      height:100%;
      width:0;
      border-radius:inherit;
      background:linear-gradient(90deg,var(--pink),var(--purple));
      transition:.25s;
    }

    .question{
      position:relative;
      z-index:3;
      margin:0 0 24px;
      font-size:clamp(23px,4.2vw,34px);
      line-height:1.35;
      font-weight:1000;
      letter-spacing:-.6px;
    }

    .options{
      position:relative;
      z-index:3;
      display:grid;
      gap:14px;
      margin-bottom:28px;
    }

    .option{
      width:100%;
      text-align:left;
      padding:18px;
      border-radius:20px;
      border:2px solid #ffe1ef;
      background:#fff;
      color:var(--text);
      line-height:1.58;
      font-weight:750;
      box-shadow:0 8px 18px rgba(255,115,183,.06);
      transition:.15s;
    }

    .option strong{
      color:#e84f96;
      margin-right:5px;
    }

    .option:hover{
      transform:translateY(-1px);
      border-color:var(--pink);
      background:#fff8fc;
    }

    .nav{
      position:relative;
      z-index:3;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .result-grid{
      position:relative;
      z-index:3;
      display:grid;
      grid-template-columns:minmax(260px,390px) 1fr;
      gap:28px;
      align-items:center;
      text-align:left;
    }

    .result-kicker{
      color:var(--muted);
      font-weight:950;
      margin-bottom:10px;
    }

    .result-title{
      margin:0 0 10px;
      font-size:clamp(44px,7vw,78px);
      line-height:1.05;
      letter-spacing:-2px;
      color:#e84f96;
      text-shadow:3px 3px 0 white,6px 6px 0 rgba(154,121,230,.18);
    }

    .result-subtitle{
      margin:0 0 18px;
      font-size:20px;
      font-weight:1000;
      color:#5c4c64;
    }

    .result-desc{
      color:#5f5266;
      line-height:1.92;
      font-size:16px;
      margin:0 0 20px;
    }

    .keywords{
      display:flex;
      flex-wrap:wrap;
      gap:9px;
      margin:18px 0 22px;
    }

    .keyword{
      padding:8px 11px;
      border-radius:999px;
      color:#7a5e84;
      background:#f5edff;
      border:1px solid #eadcff;
      font-size:13px;
      font-weight:900;
    }

    .share-box{
      padding:18px;
      border-radius:20px;
      background:linear-gradient(135deg,#fff1f8,#fffdf8);
      border:1px dashed #ffa8d4;
      color:#6b5871;
      line-height:1.75;
      margin-bottom:22px;
    }

    .button-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    /* 结果卡：CSS 绘制萨摩耶人格图 */
    .card-art{
      --accent:#ff73b7;
      --accent2:#9b79e6;
      position:relative;
      aspect-ratio:4/5;
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 15%,rgba(255,255,255,.9),transparent 28%),
        linear-gradient(160deg,#fffaf0,color-mix(in srgb,var(--accent) 16%,white),color-mix(in srgb,var(--accent2) 14%,white));
      border:5px solid color-mix(in srgb,var(--accent) 35%,white);
      box-shadow:0 18px 42px rgba(142,90,160,.22);
      isolation:isolate;
    }

    .card-art:before{
      content:"";
      position:absolute;
      inset:14px;
      border-radius:20px;
      border:2px dashed rgba(255,255,255,.7);
      z-index:1;
    }

    .art-title{
      position:absolute;
      z-index:3;
      top:26px;
      left:16px;
      right:16px;
      text-align:center;
      color:var(--accent);
      font-size:clamp(30px,5vw,44px);
      font-weight:1000;
      letter-spacing:-1px;
      line-height:1.05;
      text-shadow:2px 2px 0 #fff,4px 4px 0 rgba(155,121,230,.16);
    }

    .art-sub{
      position:absolute;
      z-index:3;
      top:86px;
      left:50%;
      transform:translateX(-50%);
      padding:5px 14px;
      border-radius:999px;
      background:var(--accent2);
      color:#fff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }

    .samoyed{
      position:absolute;
      z-index:3;
      left:50%;
      top:49%;
      transform:translate(-50%,-50%);
      width:174px;
      height:174px;
      border-radius:48% 48% 45% 45%;
      background:#fff;
      box-shadow:inset -16px -18px 0 rgba(244,226,218,.72),0 10px 24px rgba(103,79,112,.12);
    }

    .samoyed:before,.samoyed:after{
      content:"";
      position:absolute;
      top:-28px;
      width:66px;
      height:74px;
      background:#fff;
      border-radius:20px 80px 20px 80px;
      box-shadow:inset -8px -10px 0 rgba(255,208,219,.72);
    }

    .samoyed:before{left:18px;transform:rotate(-24deg)}
    .samoyed:after{right:18px;transform:rotate(24deg) scaleX(-1)}

    .eye{
      position:absolute;
      top:64px;
      width:18px;
      height:24px;
      border-radius:999px;
      background:#1e1822;
      box-shadow:inset 4px 4px 0 rgba(255,255,255,.8);
    }

    .eye.left{left:52px}
    .eye.right{right:52px}

    .blush{
      position:absolute;
      top:92px;
      width:28px;
      height:14px;
      border-radius:999px;
      background:rgba(255,142,184,.34);
    }

    .blush.left{left:28px}
    .blush.right{right:28px}

    .nose{
      position:absolute;
      top:88px;
      left:50%;
      transform:translateX(-50%);
      width:23px;
      height:17px;
      border-radius:50%;
      background:#211b22;
    }

    .mouth{
      position:absolute;
      top:110px;
      left:50%;
      transform:translateX(-50%);
      width:36px;
      height:22px;
      border-radius:0 0 999px 999px;
      background:#44232f;
      overflow:hidden;
    }

    .mouth:after{
      content:"";
      position:absolute;
      left:9px;
      bottom:-4px;
      width:18px;
      height:14px;
      border-radius:999px;
      background:#ff8eac;
    }

    .body{
      position:absolute;
      z-index:2;
      left:50%;
      bottom:52px;
      transform:translateX(-50%);
      width:210px;
      height:148px;
      border-radius:48% 48% 35% 35%;
      background:#fff;
      box-shadow:inset -18px -14px 0 rgba(244,226,218,.72);
    }

    .bandana{
      position:absolute;
      z-index:4;
      left:50%;
      top:52%;
      transform:translateX(-50%) rotate(2deg);
      width:142px;
      height:44px;
      border-radius:12px 12px 34px 34px;
      background:var(--accent);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:1000;
      box-shadow:0 6px 0 rgba(155,121,230,.15);
    }

    .paw-left,.paw-right{
      position:absolute;
      z-index:5;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#fff;
      box-shadow:inset -7px -7px 0 rgba(244,226,218,.75),0 8px 16px rgba(103,79,112,.12);
    }

    .paw-left{left:72px;top:53%;transform:rotate(-16deg)}
    .paw-right{right:70px;top:53%;transform:rotate(16deg)}

    .prop{
      position:absolute;
      z-index:6;
      display:grid;
      place-items:center;
      border-radius:18px;
      background:#fff;
      border:3px solid color-mix(in srgb,var(--accent) 45%,white);
      box-shadow:0 8px 18px rgba(103,79,112,.12);
      color:var(--accent);
      font-weight:1000;
      text-align:center;
      padding:6px;
    }

    .prop.one{left:28px;top:35%;width:112px;min-height:62px;transform:rotate(-7deg)}
    .prop.two{right:30px;top:35%;width:106px;min-height:62px;transform:rotate(8deg)}
    .prop.three{left:34px;bottom:58px;width:116px;min-height:64px;transform:rotate(5deg)}
    .prop.four{right:34px;bottom:58px;width:126px;min-height:64px;transform:rotate(-5deg)}

    .sparkle{
      position:absolute;
      z-index:2;
      color:var(--accent);
      font-size:22px;
      opacity:.78;
    }

    .s1{top:108px;left:34px}
    .s2{top:122px;right:38px;color:var(--accent2)}
    .s3{bottom:130px;left:18px;color:#ffc856}
    .s4{bottom:146px;right:22px}

    .art-front{--accent:#ff6fae;--accent2:#9b80e8}
    .art-care{--accent:#ff87b9;--accent2:#b18cf0}
    .art-love{--accent:#ff5f9d;--accent2:#c08bff}
    .art-archive{--accent:#8e6fd9;--accent2:#c49b5a}
    .art-power{--accent:#ff70a5;--accent2:#f1b23a}
    .art-data{--accent:#ee5f9f;--accent2:#7f8be8}
    .art-quiet{--accent:#9d7be8;--accent2:#e885b8}

    @media(max-width:820px){
      .result-grid{grid-template-columns:1fr}
      .card-art{max-width:390px;width:100%;margin:0 auto}
    }

    @media(max-width:620px){
      .app{width:94vw;padding-top:22px}
      .hero,.quiz,.result{padding:28px 20px}
      .cover-hero{padding:0;min-height:72vh}
      .cover-content{min-height:72vh;padding:34px 22px 28px}
      .panel:before{inset:10px}
      .nav,.button-row{flex-direction:column;align-items:stretch}
      .primary-btn,.secondary-btn{width:100%}
      .topbar{flex-direction:column;gap:6px}
      .prop.one,.prop.two{top:37%;width:96px;font-size:12px}
      .prop.three,.prop.four{width:98px;font-size:12px}
      .samoyed{width:148px;height:148px}
      .body{width:172px;height:126px}
      .paw-left{left:58px}
      .paw-right{right:58px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="hero" class="hero panel cover-hero">
      <div class="cover-media">
        <!-- 换封面：把图片命名为 cover.jpg，并和这个 HTML 放在同一个文件夹 -->
        <img src="cover.jpg" alt="封面图" class="cover-image" onerror="this.style.display='none'" />
        <div class="cover-placeholder"><span>你是哪种耶国人格？</span></div>
        <div class="cover-overlay"></div>
      </div>

      <div class="cover-content">
        <div class="badge">🐾 耶国限定 · 粉丝人格测试</div>
        <h1>你是哪种耶国人格？</h1>
        <p class="cover-note">21 道题，测测你在耶国到底是什么属性。</p>
        <button class="primary-btn" onclick="startQuiz()">开始测试</button>
      </div>
    </section>

    <section id="quiz" class="quiz panel">
      <div class="topbar">
        <span id="question-count">第 1 / 21 题</span>
        <span>耶国人格采样中...</span>
      </div>
      <div class="progress-wrap"><div id="progress" class="progress"></div></div>
      <h2 id="question" class="question"></h2>
      <div id="options" class="options"></div>
      <div class="nav">
        <button id="back-btn" class="ghost-btn" onclick="prevQuestion()">← 上一题</button>
        <button class="secondary-btn" onclick="restartQuiz()">重新开始</button>
      </div>
    </section>

    <section id="result" class="result panel">
      <div class="result-grid">
        <div id="result-art" class="card-art"></div>
        <div>
          <div class="result-kicker">你的耶国人格是</div>
          <h2 id="result-title" class="result-title"></h2>
          <p id="result-subtitle" class="result-subtitle"></p>
          <p id="result-desc" class="result-desc"></p>
          <div id="keywords" class="keywords"></div>
          <div id="share-box" class="share-box"></div>
          <div class="button-row">
            <button class="primary-btn" onclick="restartQuiz()">再测一次</button>
            <button class="secondary-btn" onclick="copyResult()">复制结果文案</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const TYPES={
      front:{name:"前排钉子户",className:"art-front",sub:"Always First in Comments",subtitle:"沈梦瑶一出现，你已经住进评论区第一楼。",desc:"你不是偶尔抢前排，你是前排永久产权持有人。别人还在点开图片，你已经完成评论、转发、尖叫、热评四连。你的手速不一定战胜所有人，但你的精神永远钉在第一楼。",keywords:["前排","热评","转发","尖叫","气氛组"],props:["抢到啦!!","评论区入住","热爱值MAX","速度就是信仰"],bandana:"前排!"},
      care:{name:"妈咪",className:"art-care",sub:"Soft Caring Fan",subtitle:"耶耶是我亲生孩子，谁懂。",desc:"你不是普通妈粉，你是耶国亲子鉴定处。别人看舞台喊杀疯了，你先问宝宝累不累、吃没吃饭、有没有好好休息。你的爱像随身保温杯，温柔但存在感很强。",keywords:["宝宝辛苦","多吃饭","早睡","心软","云养娃"],props:["宝宝辛苦了","多吃饭","妈妈在呢","快乐最重要"],bandana:"耶宝!"},
      love:{name:"梦女",className:"art-love",sub:"Hopelessly in Love Fan",subtitle:"哥哥哥哥老公老公，别管我了。",desc:"你看物料不是用眼睛，是用恋爱脑。一个眼神你能脑补三集偶像剧，一个笑你能直接改人生规划。你嘴上说别管我，实际上已经在心里循环一百遍：哥哥哥哥老公老公。",keywords:["哥哥","老公","心动","代入","恋爱脑"],props:["哥哥绝世无敌","今日份心动","命中注定","别钓了"],bandana:"心动!"},
      archive:{name:"活化石",className:"art-archive",sub:"Archive Hunter",subtitle:"梦回某年某月某造型，我记得。",desc:"你是耶国活体时间线。别人说这图好眼熟，你已经开始梦回某年某月某场某造型。只要物料存在过，你就有概率从收藏夹深处把它复活。",keywords:["考古","补档","老图","造型","时间线"],props:["老图我熟","梦回名场面","档案已归档","出处我知道"],bandana:"考古!"},
      power:{name:"大佬",className:"art-power",sub:"Power Supporter",subtitle:"一个字：买。",desc:"你对消费很理性：只买必要的。问题是，沈梦瑶相关在你这里都很必要。你不是冲动购物，你是在进行耶国基础建设。问就是买，买就是支持。",keywords:["买买买","周边","应援","票务","支持"],props:["买买买","付款成功","应援到底","爱你无价"],bandana:"全力应援!"},
      data:{name:"数据包工头",className:"art-data",sub:"Data Mission Fan",subtitle:"人手十个号，都给我动起来。",desc:"你是耶国项目现场负责人。别人还在啊啊啊，你已经问链接、规则、截止时间和目标量。你的手机里可能有十个号、五个闹钟、三个表格，以及一句信念：没有困难的数据，只有还没动起来的人。",keywords:["十号","任务","数据","控评","开工"],props:["10号到!","数据说话","任务清单","冲冲冲"],bandana:"开工!"},
      quiet:{name:"隐身全勤生",className:"art-quiet",sub:"Quiet Loyal Fan",subtitle:"从不说话，但一直都在。",desc:"你看起来像路过，实际上每天全勤。你不一定发疯，不一定抢前排，也不一定加入讨论，但动态、物料、重要节点你基本没落下。你是低调但超可靠的耶国常住民。",keywords:["潜水","默默看","收藏","全勤","陪伴"],props:["不打扰","一直都在","低调可靠","默默收藏"],bandana:"陪跑!"}

      {q:"你最容易被哪种内容击中？",options:[["新鲜自拍、新鲜微博、新鲜互动。",score({front:3,love:1})],["老舞台、老造型、老名场面。",score({archive:4})],["眼神、氛围、距离感，特别适合脑补。",score({love:4})],["她认真、努力、被大家看见的瞬间。",score({care:2,quiet:1,data:1})]]},
      {q:"有人说“这个造型好眼熟”，你会？",options:[["等一下，我知道是哪一场。",score({archive:4})],["梦回那个时期，真的杀疯了。",score({archive:2,love:2})],["别管出处了，先夸！",score({front:3,love:1})],["我收藏过，但我先潜一下。",score({quiet:3,archive:1})]]},

      {q:"你的手机里最可能有什么？",options:[["一堆截图，主要用于评论区发疯。",score({front:3,love:1})],["物料分类、旧图、名场面收藏。",score({archive:4})],["订单截图、付款记录、应援凭证。",score({power:4})],["没怎么分类，但每张都舍不得删。",score({quiet:3,care:1})]]},
      {q:"看到别人新入坑，你会？",options:[["热烈欢迎：来了就是耶国人。",score({front:3,care:1})],["直接递上入坑资料包。",score({archive:3,data:1})],["认真说：慢慢看，喜欢她会很幸福。",score({care:3,quiet:1})],["默默观察，看到对方越来越上头会很欣慰。",score({quiet:3,care:1})]]},
      {q:"如果耶耶出了新物料，你最关心？",options:[["评论区热不热闹。",score({front:3,data:1})],["宝宝状态好不好。",score({care:4})],["这套能不能代，能不能梦。",score({love:4})],["数据表现怎么样，需不需要补。",score({data:4})]]},
      {q:"看到一张神图，你的真实反应是？",options:[["立刻发出去：全世界都给我看。",score({front:3,data:1})],["这套造型梦回某年某场，我要去翻旧图。",score({archive:4})],["这个眼神，不结婚很难收场。",score({love:4})],["她真的好漂亮，妈妈心软软。",score({care:3,quiet:1})]]},
      {q:"你对“买周边/应援”的态度是？",options:[["喜欢就买，快乐最重要。",score({power:3,love:1})],["先看预算，但最后大概率还是买。",score({power:3,quiet:1})],["我不一定买很多，但我会帮忙扩散。",score({front:2,data:1,quiet:1})],["我比较安静支持，量力而行。",score({quiet:3,care:1})]]},
      {q:"群里突然刷出一堆消息，你会先看什么？",options:[["有没有新图新微博，先冲去围观。",score({front:3,love:1})],["有没有人问出处，有的话我可能能帮上。",score({archive:3,quiet:1})],["有没有开售、补款、应援、余量信息。",score({power:3,data:1})],["有没有规则、时间和需要大家一起做的事。",score({data:4})]]},
      {q:"刷到一张很会钓的图，你会？",options:[["先发出去拉人围观，不能只有我一个人疯。",score({front:3,love:1})],["一边心动一边心软：宝宝怎么这么好。",score({care:2,love:1,quiet:1})],["反复放大细节，越看越上头。",score({love:3,archive:1})],["存进相册，表面平静，内心循环播放。",score({quiet:3,love:1})]]},

      {q:"你最像哪种收藏习惯？",options:[["新图先存，表情包先做。",score({front:3,love:1})],["按年份、活动、造型分好类。",score({archive:4})],["实物周边比电子图更有安全感。",score({power:4})],["不怎么整理，但每次翻到都很开心。",score({quiet:3,care:1})]]},
      {q:"收工前又刷到一条旧动态，你会？",options:[["顺手互动一下，让它再热闹一点。",score({front:2,data:1,archive:1})],["看到她状态不错就安心，像老母亲一样点头。",score({care:3,quiet:1})],["被一个表情击中，忍不住反复回看。",score({love:3,quiet:1})],["默默收藏，想着以后肯定还会再翻到。",score({quiet:2,archive:2})]]}
    ];

    let current=0;
    let answers=[];
    let lastResultText="";

    function startQuiz(){
      current=0;
      answers=[];
      document.getElementById("hero").style.display="none";
      document.getElementById("result").style.display="none";
      document.getElementById("quiz").style.display="block";
      renderQuestion();
    }

    function restartQuiz(){
      startQuiz();
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function renderQuestion(){
      const item=QUESTIONS[current];
      document.getElementById("question-count").textContent=`第 ${current+1} / ${QUESTIONS.length} 题`;
      document.getElementById("progress").style.width=`${current/QUESTIONS.length*100}%`;
      document.getElementById("question").textContent=item.q;
      document.getElementById("back-btn").disabled=current===0;

      const el=document.getElementById("options");
      el.innerHTML="";
      item.options.forEach(([text,value],i)=>{
        const b=document.createElement("button");
        b.className="option";
        b.innerHTML=`<strong>${String.fromCharCode(65+i)}.</strong>${text}`;
        b.onclick=()=>chooseAnswer(value);
        el.appendChild(b);
      });
    }

    function chooseAnswer(value){
      answers[current]=value;
      if(current<QUESTIONS.length-1){
        current++;
        renderQuestion();
      }else{
        showResult();
      }
    }

    function prevQuestion(){
      if(current>0){
        current--;
        renderQuestion();
      }
    }

    function getScores(){
      const totals=zero();
      answers.forEach(a=>TYPE_ORDER.forEach(t=>totals[t]+=a[t]||0));
      return totals;
    }

    function pickWinner(scores){
      const max=Math.max(...TYPE_ORDER.map(t=>scores[t]));
      const tied=TYPE_ORDER.filter(t=>scores[t]===max);
      return TIE_BREAKER.find(t=>tied.includes(t));
    }

    function buildArt(key){
      const t=TYPES[key],p=t.props;
      return `<div class="art-title">${t.name}</div><div class="art-sub">${t.sub}</div><div class="sparkle s1">✦</div><div class="sparkle s2">♥</div><div class="sparkle s3">✧</div><div class="sparkle s4">★</div><div class="body"></div><div class="samoyed"><span class="eye left"></span><span class="eye right"></span><span class="blush left"></span><span class="blush right"></span><span class="nose"></span><span class="mouth"></span></div><div class="bandana">${t.bandana}</div><div class="paw-left"></div><div class="paw-right"></div><div class="prop one">${p[0]}</div><div class="prop two">${p[1]}</div><div class="prop three">${p[2]}</div><div class="prop four">${p[3]}</div>`;
    }

    function showResult(){
      const scores=getScores();
      const winner=pickWinner(scores);
      const t=TYPES[winner];

      document.getElementById("quiz").style.display="none";
      document.getElementById("result").style.display="block";

      const art=document.getElementById("result-art");
      art.className=`card-art ${t.className}`;
      art.innerHTML=buildArt(winner);

      document.getElementById("result-title").textContent=t.name;
      document.getElementById("result-subtitle").textContent=t.subtitle;
      document.getElementById("result-desc").textContent=t.desc;

      const kw=document.getElementById("keywords");
      kw.innerHTML="";
      t.keywords.forEach(w=>{
        const s=document.createElement("span");
        s.className="keyword";
        s.textContent=w;
        kw.appendChild(s);
      });

      lastResultText=`我的耶国人格是【${t.name}】。${t.subtitle}${t.desc}`;
      document.getElementById("share-box").innerHTML=`<strong>分享文案：</strong><br>${lastResultText}`;
      window.scrollTo({top:0,behavior:"smooth"});
    }

    async function copyResult(){
      try{
        await navigator.clipboard.writeText(lastResultText);
        alert("已复制结果文案！");
      }catch(e){
        alert("复制失败，可以手动选中分享文案复制。");
      }
    }
  </script>
